name: Deploy Backend to Render

# Trigger only when backend code changes on main branch
on:
  push:
    branches:
      - main
    paths:
      - 'interviewquestbackend/**'

jobs:
  build-and-deploy:
    name: Build Docker Image & Deploy to Render
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (for efficient multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 5: Build and push Docker image to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./interviewquestbackend
          file: ./interviewquestbackend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/interviewquest-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/interviewquest-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 6: Trigger Render to pull the new image and redeploy
      - name: Trigger Render Deploy Hook
        run: |
          echo "Triggering Render deploy..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render deploy hook response: $RESPONSE"
          if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 201 ]; then
            echo "Warning: Render deploy hook returned status $RESPONSE"
          else
            echo "Render deploy triggered successfully!"
          fi
